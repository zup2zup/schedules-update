<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đẩy Lịch Bay Tự Động (Sửa Lỗi Bỏ Sót Chuyến)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px auto;
            max-width: 850px;
            padding: 0 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h2 { text-align: center; color: #1a73e8; }
        .upload-zone {
            border: 3px dashed #1a73e8;
            background-color: #fff;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-zone:hover { background-color: #e8f0fe; }
        input[type="file"] { display: none; }
        #status-container {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .info { background-color: #e8f0fe; color: #1a73e8; }
        .success { background-color: #e6f4ea; color: #137333; }
        .error { background-color: #fce8e6; color: #c5221f; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>Hệ Thống Xử Lý & Tạo Sheet Lịch Bay Tự Động</h2>
    
    <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 18px; margin: 0;"><b>Kéo & Thả file lịch bay gốc vào đây</b></p>
        <p style="color: #666; margin-top: 10px;">Hoặc nhấp chuột để chọn file từ máy tính (.xlsx, .xls, .csv)</p>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
    </div>

    <div class="loader" id="spinner"></div>
    <div id="status-container"></div>

    <script>
        // === ĐIỀN URL WEB APP APPS SCRIPT CỦA BẠN VÀO ĐÂY ===
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxZRvQvrQMWNuvOz6GDmdGFYxkUWYnt1lqgsvHJBQpT-8CaLPF5Z3F2s7UfouBmWWjp/exec";

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const statusBox = document.getElementById('status-container');
        const spinner = document.getElementById('spinner');

        function showStatus(text, type) {
            statusBox.style.display = "block";
            statusBox.className = type;
            statusBox.innerText = text;
        }

        // BỘ ĐỌC GIỜ THÔNG MINH MỚI: Ép đọc mọi định dạng ô Excel (Dạng chuỗi, dạng Số, dạng Giờ có giây)
        function parseExcelTime(cellValue) {
            if (!cellValue) return null;
            
            // Trường hợp 1: Nếu Excel trả về chuỗi (VD: "12:30:00" hoặc "12:30")
            let cleanStr = String(cellValue).trim();
            if (cleanStr.includes(':')) {
                let parts = cleanStr.split(':');
                let hour = parseInt(parts[0], 10);
                let min = parseInt(parts[1], 10);
                if (!isNaN(hour) && !isNaN(min)) return { hour: hour, min: min };
            }
            
            // Trường hợp 2: Nếu Excel trả về số thập phân (tỷ lệ ngày, VD: 0.5208333 cho 12:30)
            let num = parseFloat(cellValue);
            if (!isNaN(num) && num >= 0 && num < 1) {
                let totalSeconds = Math.round(num * 24 * 60 * 60);
                let hour = Math.floor(totalSeconds / 3600);
                let min = Math.floor((totalSeconds % 3600) / 60);
                return { hour: hour, min: min };
            }
            
            // Trường hợp 3: Nếu chuỗi quá dài chứa khoảng trắng (Ví dụ định dạng Date mặc định của JS)
            let match = cleanStr.match(/(\d{2}):(\d{2}):(\d{2})/);
            if (match) {
                return { hour: parseInt(match[1], 10), min: parseInt(match[2], 10) };
            }

            return null;
        }

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.backgroundColor = '#e8f0fe'; });
        dropzone.addEventListener('dragleave', () => { dropzone.style.backgroundColor = '#fff'; });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.style.backgroundColor = '#fff';
            if (e.dataTransfer.files.length > 0) processAndUpload(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processAndUpload(e.target.files[0]);
        });

        function processAndUpload(file) {
            spinner.style.display = "block";
            showStatus("Đang đọc file và tự động xử lý quy đổi đồng bộ chuyến bay...", "info");

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    // Đọc dạng mảng thô (Mục đích tìm vị trí hàng tiêu đề DATE, FLT)
                    const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    let headerIndex = -1;
                    for (let i = 0; i < rawData.length; i++) {
                        if (rawData[i].includes('DATE') && rawData[i].includes('FLT')) {
                            headerIndex = i;
                            break;
                        }
                    }

                    if (headerIndex === -1) throw new Error("File tải lên sai cấu trúc lịch bay.");

                    // Đọc dữ liệu chính xác (Giữ nguyên định dạng gốc của ô để parseTime không bị lỗi)
                    const jsonRows = XLSX.utils.sheet_to_json(worksheet, { range: headerIndex, defval: "" });
                    let convertedRows = [];

                    jsonRows.forEach(row => {
                        // Loại bỏ các hàng trống phân cách giữa các cụm máy bay
                        if (!row['DATE'] || !row['FLT'] || !row['STD'] || !row['STA']) return;

                        let dateStr = String(row['DATE']).trim();
                        let flt = String(Math.floor(parseFloat(row['FLT'])));
                        let dep = String(row['DEP'] || '').trim();
                        let arr = String(row['ARR'] || '').trim();

                        let dateParts = dateStr.split('/');
                        if (dateParts.length < 3) return;
                        let day = parseInt(dateParts[0], 10);
                        let month = parseInt(dateParts[1], 10) - 1;
                        let year = parseInt(dateParts[2], 10);
                        if (year < 100) year += 2000;

                        // Áp dụng bộ lọc giờ thông minh mới
                        let stdTime = parseExcelTime(row['STD']);
                        let staTime = parseExcelTime(row['STA']);

                        if (!stdTime || !staTime) return; 

                        let stdUtc = new Date(Date.UTC(year, month, day, stdTime.hour, stdTime.min));
                        let staUtc = new Date(Date.UTC(year, month, day, staTime.hour, staTime.min));

                        if ((staTime.hour * 60 + staTime.min) < (stdTime.hour * 60 + stdTime.min)) {
                            staUtc.setUTCDate(staUtc.getUTCDate() + 1);
                        }

                        // Cộng đúng 7 tiếng sang giờ ICT Việt Nam
                        let stdVn = new Date(stdUtc.getTime() + (7 * 60 * 60 * 1000));
                        let staVn = new Date(staUtc.getTime() + (7 * 60 * 60 * 1000));

                        const pad = (num) => String(num).padStart(2, '0');

                        let vnDay = pad(stdVn.getUTCDate());
                        let vnMonth = pad(stdVn.getUTCMonth() + 1);
                        let vnYear = stdVn.getUTCFullYear();
                        
                        let vnStdHour = pad(stdVn.getUTCHours());
                        let vnStdMin = pad(stdVn.getUTCMinutes());
                        
                        let vnStaHour = pad(staVn.getUTCHours());
                        let vnStaMin = pad(staVn.getUTCMinutes());

                        convertedRows.push({
                            ngay: `${vnDay}/${vnMonth}/${vnYear}`,
                            flt: flt,
                            changBay: `${dep}${arr}`,
                            gioDi: `${vnStdHour}:${vnStdMin}`,
                            gioDen: `${vnStaHour}:${vnStaMin}`
                        });
                    });

                    if (convertedRows.length === 0) throw new Error("Không tìm thấy dữ liệu chuyến bay phù hợp.");

                    showStatus(`Đang tiến hành tạo Sheet mới và cập nhật ${convertedRows.length} chuyến bay lên Google Sheets...`, "info");

                    fetch(WEB_APP_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            fileName: file.name,
                            rows: convertedRows
                        })
                    })
                    .then(() => {
                        spinner.style.display = "none";
                        showStatus(`🎉 Hoàn tất thành công! Hệ thống đã nhận diện và xử lý đủ ${convertedRows.length} chuyến bay sang Giờ Việt Nam.`, "success");
                        fileInput.value = ""; 
                    })
                    .catch(err => {
                        spinner.style.display = "none";
                        showStatus("Lỗi kết nối đồng bộ Google Sheets: " + err.message, "error");
                    });

                } catch (err) {
                    spinner.style.display = "none";
                    showStatus("Lỗi phân tích cú pháp file: " + err.message, "error");
                }
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
